  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.9
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --overprovisioned
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - localhost:8082
    ports:
      - 8081:8081
      - 8082:8082
      - 9092:9092
      - 29092:29092

  console:
    image: docker.redpanda.com/redpandadata/console:v2.8.13
    restart: on-failure
    entrypoint: /bin/sh
    command: -c "echo \"$$CONSOLE_CONFIG_FILE\" > /tmp/config.yml; /app/console"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:29092"]
          schemaRegistry:
            enabled: true
            urls: ["http://redpanda:8081"]
    ports:
      - "8090:8080"
    depends_on:
      - redpanda

  postgres:
    image: postgres:16
    env_file:
      - ../../.env
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    env_file:
      - ../../.env
    environment:
      API_WORKERS: ${API_WORKERS:-5}
      FEATURE_BUILD_WORKERS: ${FEATURE_BUILD_WORKERS:-1}
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      POSTGRES_HOST: postgres
      POSTGRES_POOL_MAX_SIZE: ${POSTGRES_POOL_MAX_SIZE:-20}
      REDIS_HOST: redis
      REDIS_POOL_MAX_CONNECTIONS: ${REDIS_POOL_MAX_CONNECTIONS:-64}
      KSERVE_URL: http://lgbserver:9080/v2/models/fraud-detection/infer
      KSERVE_MAX_CONNECTIONS: ${KSERVE_MAX_CONNECTIONS:-100}
      KSERVE_MAX_KEEPALIVE_CONNECTIONS: ${KSERVE_MAX_KEEPALIVE_CONNECTIONS:-100}
    ports:
      - "1311:1311"
    command:
      - sh
      - -c
      - exec uvicorn fraud_detection.core.api:app --host 0.0.0.0 --port 1311 --workers "$${API_WORKERS:-5}" --no-access-log
    volumes:
      - type: bind
        source: ../../src/fraud_detection
        target: /app/src/fraud_detection
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      lgbserver:
        condition: service_started
    restart: unless-stopped

  lgbserver:
    image: kserve/lgbserver:latest
    container_name: lightgbm-lgbserver
    ports:
      - "8085:9080"
    volumes:
      - ../../models:/mnt/models:ro
    command:
      - --model_dir
      - /mnt/models
      - --model_name
      - fraud-detection
      - --http_port
      - "9080"
      - --workers
      - "${KSERVE_WORKERS:-4}"
      - --nthread
      - "${KSERVE_THREADS_PER_WORKER:-1}"

volumes:
  pgdata:
  redis-data:
