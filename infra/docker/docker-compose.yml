  lgbserver:
    image: kserve/lgbserver:latest
    container_name: lightgbm-lgbserver
    env_file:
      - ../../.env
    ports:
      - "8085:9080"
    volumes:
      - ../../models:/mnt/models:ro
    command:
      - --model_dir
      - /mnt/models
      - --model_name
      - fraud-detection
      - --http_port
      - "9080"
      - --workers
      - "${KSERVE_WORKERS:-5}"
      - --nthread
      - "${KSERVE_THREADS_PER_WORKER:-1}"

  postgres:
    image: postgres:16
    env_file:
      - ../../.env
    environment:
      TZ: Asia/Ho_Chi_Minh
      PGTZ: Asia/Ho_Chi_Minh
    command: ["postgres", "-c", "timezone=Asia/Ho_Chi_Minh"]
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    environment:
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redis-data:
