  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.12.0
    env_file:
      - ../../.env
    environment:
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5433"
      GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
    network_mode: host
    volumes:
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    command: >
      sh -c "pip install -q psycopg2-binary google-cloud-storage &&
      export GOOGLE_CLOUD_PROJECT=\"$$GCP_PROJECT_ID\" &&
      export GCLOUD_PROJECT=\"$$GCP_PROJECT_ID\" &&
      export CLOUDSDK_CORE_PROJECT=\"$$GCP_PROJECT_ID\" &&
      export MLFLOW_ARTIFACT_ROOT=\"gs://$$MODEL_STORAGE_BUCKET_NAME/mlflow-artifacts\" &&
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://$$POSTGRES_USER:$$POSTGRES_PASSWORD@$$POSTGRES_HOST:$$POSTGRES_PORT/$$POSTGRES_DB
      --default-artifact-root $$MLFLOW_ARTIFACT_ROOT"

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.9
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --overprovisioned
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - localhost:8082
    ports:
      - 8081:8081
      - 8082:8082
      - 9092:9092
      - 29092:29092

  console:
    image: docker.redpanda.com/redpandadata/console:v2.8.13
    restart: on-failure
    entrypoint: /bin/sh
    command: -c "echo \"$$CONSOLE_CONFIG_FILE\" > /tmp/config.yml; /app/console"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:29092"]
          schemaRegistry:
            enabled: true
            urls: ["http://redpanda:8081"]
    ports:
      - "8080:8080"
    depends_on:
      - redpanda

  lgbserver:
    image: kserve/lgbserver:latest
    container_name: lightgbm-lgbserver
    ports:
      - "8085:9080"
    volumes:
      - ../../models:/mnt/models:ro
    command:
      - --model_dir
      - /mnt/models
      - --model_name
      - fraud-detection
      - --http_port
      - "9080"

  # prometheus:
