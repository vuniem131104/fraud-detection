  redis:
    image: redis:7.2-alpine
    environment:
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  fraud-detection-api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.fraudDetection
    env_file:
      - ../../.env
    ports:
      - "1311:1311"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      lgbserver:
        condition: service_started
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  prediction-writer:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.predictionWriter
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    restart: unless-stopped
    
  feature-refresher:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.featureRefresher
    env_file:
      - ../../.env
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  lgbserver:
    image: kserve/lgbserver:latest
    container_name: lightgbm-lgbserver
    env_file:
      - ../../.env
    ports:
      - "8085:9080"
    volumes:
      - ../../models:/mnt/models:ro
    command:
      - --model_dir
      - /mnt/models
      - --model_name
      - fraud-detection
      - --http_port
      - "9080"
      - --workers
      - "${KSERVE_WORKERS:-5}"
      - --nthread
      - "${KSERVE_THREADS_PER_WORKER:-1}"

volumes:
  pgdata:
  redis-data:
  # grafana-data:
