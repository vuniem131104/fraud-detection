# ============================================================
# basic-auth-secret.yaml
# NGINX Ingress Basic Auth — synced from GCP Secret Manager.
#
# The htpasswd line ("user:hash") lives in GSM secret
# `fraud-ingress-basic-auth`. To rotate:
#   htpasswd -nb <user> <password> | gcloud secrets versions add \
#     fraud-ingress-basic-auth --data-file=-
#   kubectl annotate externalsecret basic-auth -n core \
#     force-sync=$(date +%s) --overwrite
# ============================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: basic-auth
  namespace: core
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: basic-auth
  data:
    # nginx ingress expects the htpasswd line under the "auth" key
    - secretKey: auth
      remoteRef:
        key: fraud-ingress-basic-auth
