apiVersion: v1
kind: Service
metadata:
  name: alloy
  namespace: {{ .Values.namespace }}
  labels:
    app: alloy
spec:
  clusterIP: None
  selector:
    app: alloy
  ports:
    - name: http
      port: 12345
      targetPort: 12345
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
