apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: {{ .Values.namespace }}
data:
  config.alloy: |
    // ── Kubernetes pod log discovery ──────────────────────────────────────────
    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.relabel "pod_logs" {
      targets = discovery.kubernetes.pods.targets

      // Keep only running pods
      rule {
        source_labels = ["__meta_kubernetes_pod_phase"]
        regex         = "Pending|Succeeded|Failed|Completed"
        action        = "drop"
      }

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "app"
      }
      rule {
        source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
        separator     = "/"
        target_label  = "__path__"
        replacement   = "/var/log/pods/*$2*/$3/*.log"
      }
      // Preserve original target label format for Pod UID
      rule {
        source_labels = ["__meta_kubernetes_pod_uid"]
        target_label  = "__path__"
        regex         = "(.*)"
        replacement   = "/var/log/pods/*${1}*/*/*.log"
        action        = "replace"
      }
    }

    local.file_match "pod_logs" {
      path_targets = discovery.relabel.pod_logs.output
      sync_period  = "5s"
    }

    loki.source.file "pod_logs" {
      targets    = local.file_match.pod_logs.targets
      forward_to = [loki.process.pod_logs.receiver]
    }

    loki.process "pod_logs" {
      // Extract log level via regex (covers JSON, logfmt, plain text)
      stage.regex {
        expression = "(?i)(?P<level>error|warn|warning|info|debug|trace)"
      }
      stage.labels {
        values = {
          level = "",
        }
      }
      forward_to = [loki.write.local.receiver]
    }

    loki.write "local" {
      endpoint {
        url = "{{ .Values.config.lokiEndpoint }}"
      }
      external_labels = {
        cluster = "{{ .Values.config.clusterName }}",
      }
    }

    // ── Self-metrics ──────────────────────────────────────────────────────────
    prometheus.exporter.self "alloy" {}

    prometheus.scrape "alloy_self" {
      targets    = prometheus.exporter.self.alloy.targets
      forward_to = [prometheus.remote_write.prometheus.receiver]
    }

    prometheus.remote_write "prometheus" {
      endpoint {
        url = "{{ .Values.config.prometheusEndpoint }}"
      }
    }

    // ── OpenTelemetry Distributed Tracing ──────────────────────────────────────
    otelcol.receiver.otlp "default" {
      grpc {
        endpoint = "0.0.0.0:4317"
      }
      http {
        endpoint = "0.0.0.0:4318"
      }
      output {
        traces = [otelcol.processor.batch.default.input]
      }
    }

    otelcol.processor.batch "default" {
      send_batch_size = 100
      timeout = "10s"
      output {
        traces = [otelcol.exporter.otlp.tempo.input]
      }
    }

    otelcol.exporter.otlp "tempo" {
      client {
        endpoint = "{{ .Values.config.tempoEndpoint }}"
        tls {
          insecure = true
        }
      }
    }
