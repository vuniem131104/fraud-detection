{{- if .Values.dailyRefresh.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Values.dailyRefresh.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.dailyRefresh.name }}
spec:
  schedule: {{ .Values.dailyRefresh.schedule | quote }}
  concurrencyPolicy: {{ .Values.dailyRefresh.concurrencyPolicy }}
  failedJobsHistoryLimit: {{ .Values.dailyRefresh.failedJobsHistoryLimit }}
  successfulJobsHistoryLimit: {{ .Values.dailyRefresh.successfulJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.dailyRefresh.backoffLimit }}
      ttlSecondsAfterFinished: {{ .Values.dailyRefresh.ttlSecondsAfterFinished }}
      template:
        metadata:
          labels:
            app: {{ .Values.dailyRefresh.name }}
        spec:
          serviceAccountName: {{ .Values.serviceAccount.name }}
          restartPolicy: {{ .Values.dailyRefresh.restartPolicy }}
          containers:
          - name: {{ .Values.dailyRefresh.name }}
            image: {{ .Values.dailyRefresh.image.repository }}:{{ .Values.dailyRefresh.image.tag }}
            imagePullPolicy: {{ .Values.dailyRefresh.image.pullPolicy }}
            command:
              {{- toYaml .Values.dailyRefresh.command | nindent 14 }}
            args:
              {{- toYaml .Values.dailyRefresh.args | nindent 14 }}
            envFrom:
            - configMapRef:
                name: {{ .Values.dailyRefresh.name }}-config
            - secretRef:
                name: {{ .Values.dailyRefresh.name }}-secrets
            resources:
              {{- toYaml .Values.dailyRefresh.resources | nindent 14 }}
{{- end }}
