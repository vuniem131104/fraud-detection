namespace: core

predictionWriter:
  name: prediction-writer
  replicaCount: 1
  image:
    repository: us-central1-docker.pkg.dev/project-57f7ef9a-6059-4068-ae7/fraud-detection/prediction-writer
    tag: "latest"
    pullPolicy: Always
  resources:
    requests:
      cpu: "250m"
      memory: "1Gi"
    limits:
      cpu: "1500m"
      memory: "2Gi"

cloudSqlProxy:
  image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.22.1
  port: 5432
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

serviceAccount:
  name: prediction-writer-sa
  gcpServiceAccount: "prediction-writer-sa@project-57f7ef9a-6059-4068-ae7.iam.gserviceaccount.com"
