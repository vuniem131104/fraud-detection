namespace: core

api:
  name: fraud-detection-api
  replicaCount: 2
  strategy:
    type: RollingUpdate
    params:
      maxUnavailable: 1
      maxSurge: 1
  image:
    repository: us-central1-docker.pkg.dev/project-8f21156c-3434-4d17-a8c/fraud-detection/fraud-detection-api
    tag: "latest"
    pullPolicy: Always
  port: 1311
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1500m"
      memory: "2Gi"

cloudSqlProxy:
  image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.22.1
  port: 5432
  resources:
    requests:
      cpu: "128m"
      memory: "128Mi"
    limits:
      cpu: "256m"
      memory: "256Mi"

serviceAccount:
  name: fraud-detection-api-sa
  gcpServiceAccount: "fraud-detection-api-sa@project-8f21156c-3434-4d17-a8c.iam.gserviceaccount.com"

service:
  type: ClusterIP
  port: 80
  targetPort: http

ingress:
  enabled: false
  host: "fraud-detection-api.aide-production.136.114.159.18.sslip.io"
  ingressClassName: nginx
  rewriteTarget: "/"
  maxBodySize: "50m"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilization: 70
  targetMemoryUtilization: 85
