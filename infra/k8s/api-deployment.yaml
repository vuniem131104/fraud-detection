apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-scoring-api
  labels: {app: fraud-scoring-api}
spec:
  replicas: 6
  selector:
    matchLabels: {app: fraud-scoring-api}
  template:
    metadata:
      labels: {app: fraud-scoring-api}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: registry.example.com/fraud-detection/api:latest
          ports: [{containerPort: 8000}]
          env:
            - {name: ENV, value: "prod"}
            - {name: KAFKA__BOOTSTRAP_SERVERS, value: "kafka:9092"}
            - {name: REDIS__HOST, value: "redis"}
            - {name: POSTGRES__DSN, valueFrom: {secretKeyRef: {name: fraud-db, key: dsn}}}
          resources:
            requests: {cpu: "500m", memory: "1Gi"}
            limits: {cpu: "2", memory: "4Gi"}
          readinessProbe:
            httpGet: {path: /ready, port: 8000}
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-scoring-api
spec:
  selector: {app: fraud-scoring-api}
  ports: [{port: 80, targetPort: 8000}]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fraud-scoring-api
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: fraud-scoring-api}
  minReplicas: 6
  maxReplicas: 30
  metrics:
    - type: Resource
      resource: {name: cpu, target: {type: Utilization, averageUtilization: 60}}
